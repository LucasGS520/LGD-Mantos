services:
  db:
    # Banco principal usado por todos os módulos do backend.
    image: postgres:16-alpine
    container_name: lgd_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: lgd_mantos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: lgdmantos123
    volumes:
      # Mantém os dados do PostgreSQL entre reinicializações dos containers.
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      # O backend só sobe depois que o banco responder ao pg_isready.
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 8s
      timeout: 4s
      retries: 6

  ollama:
    # Servidor de inferência local que roda o llama3.1:8b para os agentes.
    image: ollama/ollama
    container_name: lgd_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      # Mantém os pesos do modelo entre reinicializações (evita re-download de ~5 GB).
      - ollama_data:/root/.ollama
    healthcheck:
      # Verifica se o servidor Ollama está aceitando requisições.
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    # Para usar GPU NVIDIA, descomente as linhas abaixo e certifique-se de que
    # o Docker Desktop tem suporte a GPU habilitado nas configurações.
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  model-init:
    # Roda uma única vez para baixar o modelo llama3.1:8b no volume ollama_data.
    # Se o modelo já existir, o Ollama ignora o pull sem re-baixar.
    image: ollama/ollama
    container_name: lgd_model_init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["ollama", "pull", "llama3.1:8b"]
    volumes:
      - ollama_data:/root/.ollama
    restart: "no"

  backend:
    # API FastAPI com reload para desenvolvimento local.
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lgd_mantos
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy
    volumes:
      # Monta o código local para refletir alterações sem reconstruir a imagem.
      - ./backend:/app
      # Preserva imagens enviadas pelo módulo operacional.
      - uploads_data:/app/app/static/uploads
    # Inicializa tabelas/dados básicos antes de iniciar o servidor HTTP.
    command: >
      sh -c "python init_db.py && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"

  frontend_pwa:
    # PWA React/Vite para validar o fluxo completo local com a API Docker.
    image: node:20-alpine
    container_name: lgd_pwa
    restart: unless-stopped
    working_dir: /app
    depends_on:
      - backend
    environment:
      # O browser no host acessa a API publicada em localhost:8000.
      VITE_API_URL: http://localhost:8000/api/v1
    ports:
      - "5173:5173"
    volumes:
      - ./frontend_pwa:/app
    command: >
      sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"

volumes:
  # Volume persistente do PostgreSQL.
  pgdata:
  # Volume persistente para uploads de produtos.
  uploads_data:
  # Volume persistente com os pesos do modelo Ollama (~5 GB para llama3.1:8b).
  ollama_data:
