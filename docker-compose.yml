version: "3.9"
services:
  db:
    image: postgres:16-alpine
    container_name: lgd_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: lgd_mantos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: lgdmantos123
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 8s
      timeout: 4s
      retries: 6

  backend:
    build: ./backend
    container_name: lgd_mantos
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - uploads_data:/app/app/static/uploads
    command: >
      sh -c "python init_db.py && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  pgdata:
  uploads_data:
